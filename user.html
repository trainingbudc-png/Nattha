<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าผู้ใช้งาน | ระบบ iPad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <style>
        body { background: #f8fafc; font-family: 'Kanit', sans-serif; }
        .user-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin: 30px auto; max-width: 500px; }
        .greeting { font-size: 1.2rem; color: #475569; margin-bottom: 20px; }
        .btn-custom { border-radius: 12px; padding: 12px; font-weight: bold; width: 100%; margin-bottom: 12px; transition: 0.2s; }
        .btn-step1 { background: #e0f2fe; color: #0284c7; border: 1px solid #bae6fd; }
        .btn-step1:hover { background: #bae6fd; }
        .btn-step2 { background: #ccfbf1; color: #0f766e; border: 1px solid #99f6e4; }
        .btn-step2:hover { background: #99f6e4; }
        .btn-step3 { background: #ede9fe; color: #6d28d9; border: 1px solid #ddd6fe; }
        .btn-step3:hover { background: #ddd6fe; }
    </style>
</head>
<body>
    
    <div class="container">
        <div class="user-card">
            <h3 class="fw-bold text-dark text-center mb-1">📱 เมนูผู้ใช้งาน (User)</h3>
            <div class="text-center greeting">
                สวัสดี, <span id="showName" style="font-weight: bold; color: #3b82f6;">กำลังโหลด...</span>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-bold text-muted">รหัสเครื่อง iPad</label>
                <input type="text" id="ipadId" class="form-control" placeholder="ระบุรหัส iPad (เช่น A01)">
            </div>
            
            <button class="btn btn-custom btn-step1" onclick="sendData('ขอเบิก', 'รอดำเนินการ')">📦 1. แจ้งขอเบิกเครื่อง</button>
            <button class="btn btn-custom btn-step2" onclick="sendData('ยืม', 'รับเครื่องแล้ว')">✅ 2. ยืนยันรับเครื่อง</button>
            <button class="btn btn-custom btn-step3" onclick="sendData('คืน', 'รอแอดมินตรวจ')">📝 3. ส่งคืนเครื่องหลังสอบ</button>

            <hr class="my-4">
            
            <button class="btn btn-danger fw-bold" style="width: 100%; border-radius: 12px;" onclick="logout()">🚪 ออกจากระบบ</button>
        </div>
    </div>

    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <script src="script.js"></script>

    <script>
        // โชว์ชื่อจากที่ระบบจำไว้
        window.onload = () => {
            const userName = localStorage.getItem("userName");
            if (userName) {
                document.getElementById("showName").innerText = userName;
            } else {
                window.location.href = "index.html"; // ถ้าไม่มีชื่อให้กลับไปล็อกอิน
            }
        };

        // ระบบล็อกเอาท์ปิดหน้าต่าง LINE
        async function logout() {
            localStorage.removeItem("userName");
            localStorage.removeItem("userRole");

            try {
                await liff.init({ liffId: "2010557323-PAyWhGxW" }); // ใส่ LIFF ID พี่ไว้แล้ว
                if (liff.isLoggedIn()) {
                    liff.logout();
                }
                if (liff.isInClient()) {
                    liff.closeWindow(); // ปิดหน้าต่าง LINE
                } else {
                    window.location.href = "index.html"; // กลับไปหน้าแรกบนเว็บปกติ
                }
            } catch (err) {
                window.location.href = "index.html";
            }
        }
    </script>
</body>
</html>
