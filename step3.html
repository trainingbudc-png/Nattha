<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 3 | ตรวจก่อนสอบ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; font-family: 'Kanit', sans-serif; padding: 20px; }
        .card { max-width: 950px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); background: white; }
        .table th { background-color: #f1f5f9; text-align: center; font-size: 0.9rem; vertical-align: middle; }
        .table td { vertical-align: middle; text-align: center; }
        .check-item { width: 22px; height: 22px; cursor: pointer; accent-color: #dc3545; }
    </style>
</head>
<body>

<div class="card">
    <h3 class="text-center fw-bold text-danger mb-4">3. [ ก่อนสอบ ] Check List iPad ♻</h3>
    
    <div class="mb-4">
        <label class="fw-bold mb-2">เลือกรูปแบบการสอบ:</label>
        <div class="d-flex flex-wrap gap-2">
            <input type="radio" class="btn-check" name="examType" id="osce" value="OSCE" checked onclick="toggleNote(false)">
            <label class="btn btn-outline-primary" for="osce">OSCE</label>
            
            <input type="radio" class="btn-check" name="examType" id="exam" value="Exam+" onclick="toggleNote(false)">
            <label class="btn btn-outline-primary" for="exam">Exam+</label>
            
            <input type="radio" class="btn-check" name="examType" id="crq" value="CRQ" onclick="toggleNote(false)">
            <label class="btn btn-outline-primary" for="crq">CRQ</label>
            
            <input type="radio" class="btn-check" name="examType" id="none" value="ไม่ได้สอบ" onclick="toggleNote(true)">
            <label class="btn btn-outline-danger" for="none">ไม่ได้สอบ</label>
        </div>
        <div id="noteContainer" class="mt-3" style="display:none;">
            <input type="text" id="reasonNote" class="form-control" placeholder="ระบุเหตุผลที่ไม่ได้สอบ...">
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered align-middle text-center">
            <thead>
                <tr>
                    <th>iPad</th>
                    <th>Logout Drive</th>
                    <th>ปิด Wi-Fi</th>
                    <th>ปิด Bluetooth</th>
                    <th>ปิด AirDrop</th>
                    <th>โหมดเครื่องบิน</th>
                    <th>เริ่มใช้งาน</th>
                    <th>จัดการ</th> </tr>
            </thead>
            <tbody id="itemList">
                <tr><td colspan="8" class="text-muted py-4">กำลังโหลดรายการ iPad...</td></tr>
            </tbody>
        </table>
    </div>

    <button class="btn btn-danger w-100 mt-4 py-3 fw-bold fs-5" onclick="saveStep3()">💾 ยืนยันเครื่องพร้อมสอบ</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    const reqId = new URLSearchParams(window.location.search).get('reqId');

    // ฟังก์ชันซ่อน/แสดง ช่องหมายเหตุ
    function toggleNote(show) {
        document.getElementById('noteContainer').style.display = show ? 'block' : 'none';
    }

    // โหลดข้อมูลเครื่องที่ยืมมาเมื่อเปิดหน้าเว็บ
    window.onload = function() {
        if(!reqId) {
            document.getElementById('itemList').innerHTML = '<tr><td colspan="8" class="text-danger py-4">❌ ไม่พบหมายเลขรายการ (reqId) กรุณาเข้าผ่านลิงก์จาก LINE ครับ</td></tr>';
            return;
        }

        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getStep2Data", reqId: reqId }) })
        .then(res => res.json())
        .then(res => {
            const tbody = document.getElementById('itemList');
            tbody.innerHTML = "";
            
            if(res.data && res.data.length > 0) {
                res.data.forEach(item => {
                    tbody.innerHTML += `<tr data-ipad="${item.ipadId}">
                        <td class="fw-bold text-primary">${item.ipadId}</td>
                        <td><input type="checkbox" class="check-item chk-drive"></td>
                        <td><input type="checkbox" class="check-item chk-wifi"></td>
                        <td><input type="checkbox" class="check-item chk-bt"></td>
                        <td><input type="checkbox" class="check-item chk-airdrop"></td>
                        <td><input type="checkbox" class="check-item chk-flight"></td>
                        <td><input type="checkbox" class="check-item chk-start"></td>
                        <td><button type="button" class="btn btn-success btn-sm fw-bold" onclick="checkAllInRow(this)">✔ ติ๊กครบ</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = `<tr><td colspan="8" class="text-danger py-4">❌ ไม่พบข้อมูล iPad สำหรับรายการนี้</td></tr>`;
            }
        })
        .catch(err => {
            document.getElementById('itemList').innerHTML = `<tr><td colspan="8" class="text-danger py-4">❌ เกิดข้อผิดพลาดในการโหลดข้อมูล</td></tr>`;
        });
    };

    // ฟังก์ชันสำหรับปุ่ม "ติ๊กครบ" ทั้งแถว
    function checkAllInRow(btn) {
        const row = btn.closest('tr');
        row.querySelectorAll('.check-item').forEach(cb => {
            cb.checked = true;
        });
    }

    // ฟังก์ชันบันทึกข้อมูล
    async function saveStep3() {
        const btn = document.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = "⏳ กำลังบันทึกข้อมูล..."; 
        btn.disabled = true;
        
        const examValue = document.querySelector('input[name="examType"]:checked').value;
        const noteValue = document.getElementById('reasonNote').value;
        
        let items = [];
        document.querySelectorAll('#itemList tr[data-ipad]').forEach(row => {
            const checks = Array.from(row.querySelectorAll('.check-item')).map(c => c.checked ? "☑" : "☐");
            items.push({ ipadId: row.dataset.ipad, checks: checks });
        });

        if(items.length === 0) {
            alert("⚠️ ไม่มีข้อมูล iPad ให้บันทึกครับ");
            btn.innerText = originalText; 
            btn.disabled = false;
            return;
        }
        
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "saveStep3", 
                    reqId: reqId, 
                    items: items, 
                    exam: examValue, 
                    note: noteValue, 
                    name: localStorage.getItem("userName") || "Unknown"
                })
            });
            
            const result = await res.json();
            if(result.status === "success") {
                alert("✅ บันทึกข้อมูลตรวจก่อนสอบเรียบร้อยแล้วครับ!");
                window.location.href = "admin.html"; // กลับไปหน้าแอดมินอัตโนมัติ
            } else {
                alert("❌ เกิดข้อผิดพลาดจากเซิร์ฟเวอร์: " + result.message);
                btn.innerText = originalText; 
                btn.disabled = false;
            }
        } catch (error) {
            alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อ: " + error);
            btn.innerText = originalText; 
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
