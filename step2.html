<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบและยืนยันรับเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Sarabun', sans-serif; padding: 20px; }
        .confirm-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 850px; margin: auto; }
        .btn-confirm { background: #10b981; color: white; border-radius: 12px; padding: 15px; font-weight: bold; width: 100%; margin-top: 20px; }
        .btn-confirm:disabled { background: #cbd5e1; }
        .btn-check:checked + .btn-outline-primary { background-color: #0d6efd; color: white; }
    </style>
</head>
<body>

<div class="confirm-card">
    <h4 class="text-center fw-bold">📋 ตรวจสอบอุปกรณ์ก่อนรับ</h4>
    <p class="text-center text-muted">รายการ: <span id="reqIdDisp" class="fw-bold text-primary">กำลังโหลด...</span></p>

    <div class="table-responsive">
        <table class="table table-bordered align-middle text-center">
            <thead class="table-light">
                <tr>
                    <th>iPad</th>
                    <th>Drive</th><th>File</th><th>Img</th><th>Safari</th>
                    <th>ลัด</th>
                </tr>
            </thead>
            <tbody id="itemList">
                <tr><td colspan="6">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="mt-3">
        <label class="fw-bold small">💬 รายงานปัญหา (ไม่บังคับ):</label>
        <textarea id="reportNote" class="form-control" rows="2" placeholder="แจ้งรอย, จอติดขัด หรือปัญหาอื่นๆ..."></textarea>
    </div>

    <div class="form-check mt-3">
        <input class="form-check-input" type="checkbox" id="checkFinal" onchange="validateForm()">
        <label class="form-check-label small" for="checkFinal">ข้าพเจ้าตรวจสอบสภาพเครื่องที่เลือกและแอปพลิเคชันครบทุกข้อแล้ว</label>
    </div>

    <button id="btnSubmit" class="btn btn-confirm" onclick="submitReceipt()" disabled>✅ ยืนยันการรับเครื่อง</button>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    const reqId = new URLSearchParams(window.location.search).get('reqId');
    document.getElementById('reqIdDisp').innerText = reqId || "ไม่พบรายการ";

    fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({ action: "getStep1Data", reqId: reqId })
    })
    .then(res => res.json())
    .then(res => {
        const tbody = document.getElementById('itemList');
        tbody.innerHTML = "";
        res.data.forEach((item) => {
            tbody.innerHTML += `<tr>
                <td>
                    <input type="checkbox" class="btn-check select-ipad" id="btn-${item.ipadId}" onchange="validateForm()">
                    <label class="btn btn-outline-primary btn-sm w-100" for="btn-${item.ipadId}">${item.ipadId}</label>
                </td>
                <td><input type="checkbox" class="form-check-input check-app ${item.ipadId}-app" onchange="validateForm()"></td>
                <td><input type="checkbox" class="form-check-input check-app ${item.ipadId}-app" onchange="validateForm()"></td>
                <td><input type="checkbox" class="form-check-input check-app ${item.ipadId}-app" onchange="validateForm()"></td>
                <td><input type="checkbox" class="form-check-input check-app ${item.ipadId}-app" onchange="validateForm()"></td>
                <td><button class="btn btn-success btn-sm" onclick="tickAll('${item.ipadId}')">✅</button></td>
            </tr>`;
        });
    });

    function tickAll(ipadId) {
        document.querySelectorAll(`.${ipadId}-app`).forEach(cb => cb.checked = true);
        validateForm();
    }

    function validateForm() {
        const selectedIpads = document.querySelectorAll('.select-ipad:checked');
        const finalChecked = document.getElementById('checkFinal').checked;
        
        let allAppsChecked = true;
        selectedIpads.forEach(ipad => {
            const row = ipad.closest('tr');
            const apps = row.querySelectorAll('.check-app');
            apps.forEach(app => { if(!app.checked) allAppsChecked = false; });
        });

        document.getElementById('btnSubmit').disabled = !(selectedIpads.length > 0 && allAppsChecked && finalChecked);
    }

    async function submitReceipt() {
        const btn = document.getElementById('btnSubmit');
        const report = document.getElementById('reportNote').value;
        btn.innerText = "กำลังบันทึก...";
        btn.disabled = true;
        
        await fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ 
                action: "updateStatus", 
                reqId: reqId, 
                name: "ผู้ใช้ยืนยันผ่านมือถือ", 
                status: "รับเครื่องแล้ว",
                note: report ? `ปัญหา: ${report}` : "ปกติ"
            })
        });
        alert("บันทึกข้อมูลเรียบร้อย!");
        window.close();
    }
</script>
</body>
</html>
