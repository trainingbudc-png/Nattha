<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบและยืนยันรับเครื่อง - Step 2</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Kanit', sans-serif; padding: 20px; }
        .confirm-card { background: white; padding: 0; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.08); max-width: 900px; margin: auto; overflow: hidden; }
        
        .purple-header { background-color: #10b981; color: white; padding: 20px; font-weight: 600; font-size: 1.2rem; display: flex; justify-content: space-between; align-items: center; }
        .req-id-badge { background: rgba(255,255,255,0.2); padding: 4px 12px; border-radius: 8px; font-size: 0.9rem; }
        
        .info-panel { padding: 20px; background: #f8fafc; border-bottom: 1px solid #e2e8f0; }
        .info-label { font-size: 0.8rem; color: #64748b; font-weight: 600; text-transform: uppercase; }
        .info-value { font-size: 1.1rem; font-weight: bold; color: #1e293b; }
        
        .table th { font-size: 0.85rem; vertical-align: middle; text-align: center; color: #4b5563; background: #f9fafb; padding: 12px; }
        .table td { vertical-align: middle; text-align: center; padding: 12px; }
        
        .check-item { width: 22px; height: 22px; cursor: pointer; accent-color: #10b981; }
        .btn-shortcut { background: #dcfce7; color: #065f46; border: none; font-size: 0.75rem; font-weight: bold; padding: 5px 10px; border-radius: 6px; }
        .btn-shortcut:hover { background: #bbf7d0; }
        
        .btn-confirm { background: #10b981; color: white; border-radius: 12px; padding: 15px; font-weight: bold; width: calc(100% - 40px); margin: 20px; border: none; transition: 0.3s; }
        .btn-confirm:hover { background: #059669; }
        .btn-confirm:disabled { background: #cbd5e1; }
    </style>
</head>
<body>

<div class="confirm-card">
    <div class="purple-header">
        <span>📋 ตรวจสอบอุปกรณ์ก่อนรับ</span>
        <span class="req-id-badge" id="headerReqId">รายการ: Loading...</span>
    </div>

    <div class="info-panel d-flex justify-content-around">
        <div class="text-center">
            <div class="info-label">ผู้ขอเบิก</div>
            <div id="displayUserName" class="info-value">...</div>
        </div>
        <div class="text-center">
            <div class="info-label">แอดมินผู้เตรียม</div>
            <div id="displayAdminName" class="info-value">...</div>
        </div>
    </div>
    
    <div class="table-responsive">
        <table class="table table-bordered align-middle">
            <thead>
                <tr>
                    <th>iPad</th>
                    <th>Drive</th>
                    <th>File</th>
                    <th>Img</th>
                    <th>Safari</th>
                    <th>ปุ่มลัด</th>
                </tr>
            </thead>
            <tbody id="itemList">
                <tr><td colspan="6" class="text-muted py-4">กำลังโหลดข้อมูล...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="p-3">
        <textarea id="reportNote" class="form-control" rows="2" placeholder="หมายเหตุเพิ่มเติม (ถ้ามี)..."></textarea>
        <button id="btnSubmit" class="btn btn-confirm" onclick="submitReceipt()" disabled>✅ ยืนยันการรับเครื่อง</button>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    const reqId = new URLSearchParams(window.location.search).get('reqId');
    const currentLoggerName = localStorage.getItem("userName") || "ผู้ใช้งาน";

    window.onload = function() {
        if(!reqId) { alert("ไม่พบเลขรายการ"); return; }
        document.getElementById('headerReqId').innerText = "รายการ: " + reqId;

        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getStep1Data", reqId: reqId }) })
        .then(res => res.json())
        .then(res => {
            document.getElementById('displayUserName').innerText = res.userName || "ไม่ระบุ";
            document.getElementById('displayAdminName').innerText = res.adminName || "ไม่ระบุ";

            const tbody = document.getElementById('itemList');
            tbody.innerHTML = "";

            if(res.data && res.data.length > 0) {
                res.data.forEach(item => {
                    tbody.innerHTML += `<tr>
                        <td class="fw-bold"><input type="checkbox" class="select-ipad me-2" id="btn-${item.ipadId}" onchange="validateForm()"> <label for="btn-${item.ipadId}" style="cursor:pointer;">${item.ipadId}</label></td>
                        <td><input type="checkbox" class="check-app form-check-input"></td>
                        <td><input type="checkbox" class="check-app form-check-input"></td>
                        <td><input type="checkbox" class="check-app form-check-input"></td>
                        <td><input type="checkbox" class="check-app form-check-input"></td>
                        <td><button type="button" class="btn btn-shortcut" onclick="tickAll(this)">ติ๊กครบ</button></td>
                    </tr>`;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="text-danger py-3">❌ ไม่พบรายการเครื่อง</td></tr>';
            }
        });
    };

    function tickAll(btn) {
        const row = btn.closest('tr');
        row.querySelector('.select-ipad').checked = true;
        row.querySelectorAll('.check-app').forEach(cb => cb.checked = true);
        validateForm();
    }

    function validateForm() {
        document.getElementById('btnSubmit').disabled = document.querySelectorAll('.select-ipad:checked').length === 0;
    }

    async function submitReceipt() {
        const btn = document.getElementById('btnSubmit');
        btn.innerText = "⏳ กำลังบันทึก..."; 
        btn.disabled = true;
        
        let items = [];
        document.querySelectorAll('.select-ipad:checked').forEach(ipad => {
            const row = ipad.closest('tr');
            const checks = Array.from(row.querySelectorAll('.check-app')).map(c => c.checked ? "☑" : "☐");
            items.push({ ipadId: row.querySelector('label').innerText, checklist: checks.join(",") });
        });

        try {
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "updateStatus", 
                    reqId: reqId, 
                    items: items, 
                    note: document.getElementById('reportNote').value, 
                    name: currentLoggerName 
                })
            });
            
            // Redirect ไปหน้า success.html
            const summary = `เลขรายการ: ${reqId}\nรายการเครื่อง: ${items.map(i => i.ipadId).join(', ')}`;
            window.location.href = `success.html?title=รับเครื่องสำเร็จ&desc=ระบบยืนยันการรับเครื่องเรียบร้อยแล้ว&summary=${encodeURIComponent(summary)}`;
            
        } catch (error) {
            alert("❌ เกิดข้อผิดพลาด");
            btn.innerText = "✅ ยืนยันการรับเครื่อง";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
