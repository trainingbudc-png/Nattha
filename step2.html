<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>ตรวจสอบและยืนยันรับเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f1f5f9; font-family: 'Kanit', sans-serif; padding: 20px; }
        .confirm-card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); max-width: 850px; margin: auto; }
        .btn-confirm { background: #10b981; color: white; border-radius: 12px; padding: 15px; font-weight: bold; width: 100%; margin-top: 20px; transition: 0.3s; }
        .btn-confirm:hover { background: #059669; color: white; }
        .info-box { background-color: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 20px; }
        .info-label { font-size: 0.85rem; color: #64748b; margin-bottom: 2px; }
        .info-value { font-size: 1.1rem; font-weight: bold; }
        .divider { width: 1px; background-color: #cbd5e1; height: 40px; }
        
        /* สไตล์ตอน Checkbox โดนล็อก */
        .check-app:disabled { cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>
<div class="confirm-card">
    <h4 class="text-center fw-bold text-dark mb-4">📋 [Step2] ตรวจสอบอุปกรณ์ก่อนรับ</h4>
    
    <!-- กล่องแสดงข้อมูลผู้เบิกและแอดมิน -->
    <div class="info-box d-flex justify-content-around align-items-center">
        <div class="text-center">
            <div class="info-label">👤 ผู้ขอเบิกยืม:</div>
            <div id="displayUserName" class="info-value text-primary">กำลังโหลด...</div>
        </div>
        <div class="divider"></div>
        <div class="text-center">
            <div class="info-label">👨‍💻 แอดมินผู้เตรียม:</div>
            <div id="displayAdminName" class="info-value text-success">กำลังโหลด...</div>
        </div>
    </div>

    <div class="table-responsive">
        <table class="table table-bordered text-center align-middle">
            <thead class="table-light">
                <tr><th>iPad</th><th>Drive</th><th>File</th><th>Img</th><th>Safari</th><th>ปุ่มลัด</th></tr>
            </thead>
            <tbody id="itemList">
                <tr><td colspan="6" class="text-muted py-3">กำลังโหลดข้อมูล... ⏳</td></tr>
            </tbody>
        </table>
    </div>
    <textarea id="reportNote" class="form-control mt-3" rows="2" placeholder="หมายเหตุเพิ่มเติม (ถ้ามี)..."></textarea>
    <button id="btnSubmit" class="btn btn-confirm" onclick="submitReceipt()">✅ ยืนยันการรับเครื่อง</button>
</div>

<!-- 📌 โหลด SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    const reqId = new URLSearchParams(window.location.search).get('reqId');
    const currentLoggerName = localStorage.getItem("userName") || "ผู้ใช้งาน";

    fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getStep1Data", reqId: reqId }) })
    .then(res => res.json())
    .then(res => {
        document.getElementById('displayUserName').innerText = res.userName || "ไม่ระบุ";
        document.getElementById('displayAdminName').innerText = res.adminName || "ไม่ระบุ";

        const tbody = document.getElementById('itemList');
        tbody.innerHTML = ""; 

        if(res.data && res.data.length > 0) {
            res.data.forEach(item => {
                // 📌 สังเกตที่ class check-app จะมี disabled อยู่ (ถูกล็อกตั้งแต่แรก)
                tbody.innerHTML += `<tr>
                    <td class="fw-bold text-start">
                        <input type="checkbox" class="select-ipad form-check-input me-2" id="btn-${item.ipadId}" onchange="toggleRow(this)"> 
                        <label for="btn-${item.ipadId}" style="cursor:pointer;">${item.ipadId}</label>
                    </td>
                    <td><input type="checkbox" class="check-app form-check-input" disabled></td>
                    <td><input type="checkbox" class="check-app form-check-input" disabled></td>
                    <td><input type="checkbox" class="check-app form-check-input" disabled></td>
                    <td><input type="checkbox" class="check-app form-check-input" disabled></td>
                    <td><button type="button" class="btn btn-success btn-sm fw-bold w-100" onclick="tickAll(this)">✔ ติ๊กครบ</button></td>
                </tr>`;
            });
        } else {
            tbody.innerHTML = '<tr><td colspan="6" class="text-danger py-3">❌ ไม่พบรายการเครื่อง</td></tr>';
        }
    });

    // 📌 ฟังก์ชันปลดล็อก/ล็อก Checkbox ของแถวนั้นๆ
    function toggleRow(checkbox) {
        const row = checkbox.closest('tr');
        row.querySelectorAll('.check-app').forEach(app => {
            app.disabled = !checkbox.checked; // ถ้าติ๊ก iPad จะปลดล็อก, ถ้าไม่ติ๊ก จะล็อก
            if (!checkbox.checked) app.checked = false; // ถ้าเอาติ๊กหน้า iPad ออก ให้เคลียร์ check list ด้วย
        });
    }

    // 📌 ฟังก์ชันปุ่มลัด (ถ้ากดปุ่มลัด จะติ๊กหน้า iPad และปลดล็อกให้เลยอัตโนมัติ)
    function tickAll(btn) {
        const row = btn.closest('tr');
        const mainCheck = row.querySelector('.select-ipad');
        
        mainCheck.checked = true; // ติ๊กหน้าชื่อ iPad
        row.querySelectorAll('.check-app').forEach(cb => {
            cb.disabled = false; // ปลดล็อก
            cb.checked = true;   // ติ๊กถูก
        });
    }

    async function submitReceipt() {
        let items = [];
        document.querySelectorAll('.select-ipad:checked').forEach(ipad => {
            const row = ipad.closest('tr');
            const checks = Array.from(row.querySelectorAll('.check-app')).map(c => c.checked ? "☑" : "☐");
            items.push({ ipadId: row.querySelector('label').innerText, checklist: checks.join(",") });
        });

        // 🚨 ดักจับ: ถ้าไม่เลือก iPad ให้บล็อกทันที
        if (items.length === 0) {
            Swal.fire({
                title: "⚠️ ข้อมูลไม่ครบถ้วน",
                text: "กรุณาติ๊กเลือกหน้าชื่อ iPad อย่างน้อย 1 เครื่องก่อนกดยืนยันครับ!",
                icon: "warning",
                confirmButtonColor: "#10b981"
            });
            return;
        }

        const btn = document.getElementById('btnSubmit');
        btn.innerText = "กำลังบันทึกข้อมูล... ⏳"; 
        btn.disabled = true;

        try {
            const response = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "updateStatus", 
                    reqId: reqId, 
                    items: items, 
                    note: document.getElementById('reportNote').value, 
                    name: currentLoggerName 
                })
            });
            
            const result = await response.json();
            if (result.status === "success") {
                window.location.href = `success.html?reqId=${reqId}&status=รับเครื่องเรียบร้อย&count=${items.length}`;
            } else {
                Swal.fire("❌ เกิดข้อผิดพลาด", result.message || "ในการบันทึกข้อมูล", "error");
                btn.innerText = "✅ ยืนยันการรับเครื่อง";
                btn.disabled = false;
            }
        } catch (error) {
            Swal.fire("❌ เกิดข้อผิดพลาด", "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้", "error");
            btn.innerText = "✅ ยืนยันการรับเครื่อง";
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
