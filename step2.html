<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ยืนยันการรับอุปกรณ์</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { font-family: sans-serif; background: #0f172a; color: #fff; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .card-ui { background: rgba(255, 255, 255, 0.05); padding: 40px; border-radius: 20px; width: 90%; max-width: 400px; text-align: center; }
    </style>
</head>
<body>
    <div class="card-ui">
        <h2>ยืนยันรับเครื่อง</h2>
        <div id="displayReqId" style="font-size: 2rem; color: #38bdf8;">Loading...</div>
        <input type="text" id="recipientName" class="form-control my-3" placeholder="ชื่อผู้รับ">
        <button class="btn btn-primary w-100" onclick="submitStep2()">ยืนยัน</button>
    </div>
    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
        const reqId = new URLSearchParams(window.location.search).get('reqId');
        document.getElementById("displayReqId").innerText = reqId || "ERROR";
        async function submitStep2() {
            const name = document.getElementById("recipientName").value;
            if(!name) return alert("ระบุชื่อด้วยครับ");
            try {
                await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "updateStatus", reqId: reqId, name: name, status: "รับเครื่องแล้ว", note: `ผู้รับ: ${name}` })
                });
                alert("บันทึกสำเร็จ!");
            } catch(e) { alert("error"); }
        }
    </script>
</body>
</html>
