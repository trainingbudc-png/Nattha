<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบเช็คลิสต์จัดเตรียมเครื่อง - Step 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #fafbfe; padding: 20px; }
        .form-container { background: #ffffff; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); padding: 30px; max-width: 800px; margin: auto; }
        .table th { background-color: #f1f5f9; color: #334155; font-weight: 600; text-align: center; font-size: 0.9rem; }
        .table td { vertical-align: middle; text-align: center; }
        .form-control-disabled { background-color: #f8fafc !important; font-weight: bold; color: #1e293b; }
        input[type="checkbox"] { width: 20px; height: 20px; cursor: pointer; }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="fw-bold mb-0 text-success">⚙️ ขั้นตอนที่ 1 | จัดเตรียม iPad</h3>
            <a href="step1-list.html" class="btn btn-outline-secondary btn-sm">↩️ เปลี่ยนรายการเบิก</a>
        </div>
        
        <div class="mb-3">
            <input type="text" id="adminNameDisplay" class="form-control text-muted bg-light" readonly style="font-size: 0.9rem; border: none;">
        </div>

        <hr>

        <form id="step1Form" onsubmit="event.preventDefault(); submitStep1Form();">
            <div class="row g-3 mb-4">
                <div class="col-md-8">
                    <label class="form-label fw-bold text-secondary">👤 ชื่อผู้ขอเบิกอุปกรณ์</label>
                    <input type="text" id="recipientName" class="form-control form-control-disabled" readonly>
                </div>
                <div class="col-md-4">
                    <label class="form-label fw-bold text-secondary">📦 จำนวนที่ต้องเตรียม</label>
                    <input type="text" id="deviceCountDisplay" class="form-control form-control-disabled text-center" readonly>
                </div>
            </div>

            <p class="fw-bold text-dark mb-2">📋 รายการเช็คลิสต์และคีย์รหัสเครื่อง:</p>
            <div class="table-responsive mb-4">
                <table class="table table-bordered align-middle">
                    <thead>
                        <tr>
                            <th style="width: 28%;">รหัสเครื่อง iPad</th>
                            <th style="width: 18%;">Google Drive</th>
                            <th style="width: 18%;">แอป File</th>
                            <th style="width: 18%;">แอป รูปภาพ</th>
                            <th style="width: 18%;">แอป Safari</th>
                        </tr>
                    </thead>
                    <tbody id="checklistBody">
                        </tbody>
                </table>
            </div>

            <div class="d-grid">
                <button type="submit" class="btn btn-success btn-lg fw-bold py-3 shadow-sm">💾 ส่งข้อมูลการเตรียมเครื่องเข้าระบบ</button>
            </div>
        </form>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";

    window.onload = function() {
        // 1. ดึงข้อมูลชื่อแอดมินผู้เข้าใช้ระบบ
        const adminName = localStorage.getItem("userName");
        if (adminName) {
            document.getElementById("adminNameDisplay").value = "👨‍💻 ผู้ดำเนินการบันทึก: " + adminName;
        } else {
            alert("เซสชันหมดอายุ กรุณาเข้าสู่ระบบใหม่ครับ");
            window.location.href = "index.html";
            return;
        }

        // 2. ดึงค่า Parameters ที่ลิ้งก์ส่งต่อข้ามหน้ามา
        const urlParams = new URLSearchParams(window.location.search);
        const nameParam = urlParams.get('name');
        const countParam = urlParams.get('count');

        if (!nameParam || !countParam) {
            alert("ไม่พบข้อมูลรายการขอเบิก กรุณาเลือกคิวจากหน้ารายการก่อนครับ");
            window.location.href = "step1-list.html";
            return;
        }

        const recipientName = decodeURIComponent(nameParam);
        const deviceCount = parseInt(countParam) || 1;

        // 3. หยอดข้อมูลลงในช่องฟอร์ม
        document.getElementById("recipientName").value = recipientName;
        document.getElementById("deviceCountDisplay").value = deviceCount + " เครื่อง";

        // 4. วนลูปสร้างแถวตารางเช็คลิสต์ตามจำนวนเครื่องจริง
        const tableBody = document.getElementById("checklistBody");
        tableBody.innerHTML = "";
        
        for (let i = 1; i <= deviceCount; i++) {
            const tr = document.createElement("tr");
            tr.innerHTML = `
                <td><input type="text" class="input-ipad-id form-control fw-bold text-center" placeholder="รหัสเครื่องที่ ${i}" required style="border-color: #cbd5e1;"></td>
                <td><input type="checkbox" class="chk-drive mx-auto d-block" checked></td>
                <td><input type="checkbox" class="chk-file mx-auto d-block" checked></td>
                <td><input type="checkbox" class="chk-img mx-auto d-block" checked></td>
                <td><input type="checkbox" class="chk-safari mx-auto d-block" checked></td>
            `;
            tableBody.appendChild(tr);
        }
    };

    async function submitStep1Form() {
        const adminName = localStorage.getItem("userName");
        const recipientName = document.getElementById("recipientName").value;
        const countText = document.getElementById("deviceCountDisplay").value;

        const rows = document.querySelectorAll('#checklistBody tr');
        let ipadDataArray = [];
        let isAllFilled = true;
        let allChecked = true;

        rows.forEach(row => {
            const idInput = row.querySelector('.input-ipad-id');
            if (idInput) {
                const ipadId = idInput.value.trim();
                if (ipadId === "") isAllFilled = false;

                const isDriveChecked = row.querySelector('.chk-drive').checked;
                const isFileChecked = row.querySelector('.chk-file').checked;
                const isImgChecked = row.querySelector('.chk-img').checked;
                const isSafariChecked = row.querySelector('.chk-safari').checked;

                if (!isDriveChecked || !isFileChecked || !isImgChecked || !isSafariChecked) {
                    allChecked = false;
                }

                ipadDataArray.push({
                    id: ipadId,
                    drive: isDriveChecked ? "ผ่าน" : "ไม่ผ่าน",
                    file: isFileChecked ? "ผ่าน" : "ไม่ผ่าน",
                    img: isImgChecked ? "ผ่าน" : "ไม่ผ่าน",
                    safari: isSafariChecked ? "ผ่าน" : "ไม่ผ่าน"
                });
            }
        });

        if (!isAllFilled) {
            alert("❌ กรุณากรอก 'รหัสเครื่อง iPad' ให้ครบถ้วนทุกเครื่องก่อนส่งข้อมูลครับ");
            return;
        }

        if (!allChecked) {
            if (!confirm("⚠️ พบว่าแอปบางรายการยังไม่ได้ติ๊กผ่าน คุณยืนยันที่จะส่งบันทึกแบบนี้ใช่หรือไม่?")) return;
        }

        try {
            // ส่งค่าไปบันทึกที่ Google Apps Script หลังบ้าน (บันทึกเริ่มที่ช่อง F เคลียร์ช่อง E ว่างตามเดิม)
            await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "saveStep1",
                    adminName: adminName,
                    ipadData: ipadDataArray,
                    note: `เตรียมให้: ${recipientName} (${countText})`
                })
            });

            alert("🎉 บันทึกประวัติและเช็คลิสต์ลง Google Sheets เรียบร้อยแล้วครับ!");
            window.location.href = "admin.html"; // ย้ายกลับไปหน้าแรกของแอดมิน
        } catch (error) {
            alert("เกิดข้อผิดพลาดในการบันทึกข้อมูลฟอร์ม: " + error);
        }
    }
</script>
</body>
</html>
