<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Step 1 | เตรียมเครื่อง</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f4f6f9; 
            padding: 20px; 
            color: #333;
        }
        
        .card-custom { 
            background: white; 
            border: none; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-top: 6px solid #00897b; 
        }
        
        .form-label { font-weight: 600; color: #495057; }
        
        .btn-outline-teal {
            color: #00897b;
            border-color: #00897b;
            font-weight: 500;
            border-radius: 8px;
        }
        .btn-outline-teal:hover {
            background-color: #e0f2f1;
            color: #00695c;
        }
        .btn-check:checked + .btn-outline-teal {
            background-color: #00897b;
            color: white;
            border-color: #00897b;
            box-shadow: 0 4px 10px rgba(0, 137, 123, 0.3);
        }

        .ipad-container {
            max-height: 250px;
            overflow-y: auto;
            padding: 10px;
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
        }

        .btn-submit-custom {
            background-color: #00897b;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-submit-custom:hover {
            background-color: #00695c;
            color: white;
        }

        /* Checkbox style สำหรับตาราง */
        .form-check-input { width: 1.2em; height: 1.2em; cursor: pointer; accent-color: #00897b; }
        .form-check-input:checked { background-color: #00897b; border-color: #00897b; }
        
        /* สไตล์ตารางเช็คลิสต์รายเครื่อง */
        .table th { background-color: #f1f8f7; color: #00695c; font-size: 0.9rem; text-align: center; vertical-align: middle; }
        .table td { vertical-align: middle; text-align: center; border-bottom: 1px solid #e2e8f0; }
    </style>
</head>
<body>
    
    <div class="container my-4" style="max-width: 900px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-dark fw-bold mb-0">📦 Step 1 | เตรียมเครื่อง iPad</h3>
            <a href="admin.html" class="btn btn-secondary px-4 fw-bold rounded-pill">🔙 กลับหน้าแอดมิน</a>
        </div>
        
        <div class="card card-custom p-4 p-md-5 mx-auto">
            <form id="step1Form">
                
                <div class="mb-4">
                    <label class="form-label">👤 เลือกผู้ขอเบิกยืม (ผู้ใช้งาน):</label>
                    <select id="userNameSelect" class="form-select form-select-lg" required>
                        <option value="">กำลังโหลดรายชื่อ... ⏳</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label d-flex justify-content-between">
                        <span>📱 เลือกเครื่อง iPad ที่ว่าง (กดเลือกได้หลายเครื่อง):</span>
                        <span class="badge bg-secondary" id="selectedCount">เลือกแล้ว 0 เครื่อง</span>
                    </label>
                    
                    <div id="ipadButtonContainer" class="ipad-container d-flex flex-wrap gap-2">
                        <div class="text-muted w-100 text-center py-3">กำลังโหลดคลัง iPad... ⏳</div>
                    </div>
                </div>

                <!-- 📌 ตารางเช็คลิสต์รายเครื่อง (ซ่อนไว้ก่อน จะแสดงเมื่อมีการเลือก iPad) -->
                <div id="dynamicChecklistContainer" class="mb-4 d-none">
                    <label class="form-label text-teal fw-bold" style="color: #00695c;">✅ สิ่งที่แอดมินต้องเตรียม (เช็คให้ครบทุกเครื่อง):</label>
                    <div class="table-responsive border rounded">
                        <table class="table table-borderless mb-0">
                            <thead>
                                <tr>
                                    <th>รหัส iPad</th>
                                    <th>G-Drive</th>
                                    <th>ไฟล์เอกสาร</th>
                                    <th>ไฟล์รูปภาพ</th>
                                    <th>Safari</th>
                                    <th>ปุ่มลัด</th>
                                </tr>
                            </thead>
                            <tbody id="dynamicChecklistBody">
                                <!-- แถวของแต่ละ iPad จะโผล่ขึ้นมาตรงนี้ -->
                            </tbody>
                        </table>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">📝 หมายเหตุ (ถ้ามี):</label>
                    <input type="text" id="noteInput" class="form-control" placeholder="เช่น เตรียมให้ก่อน 10 โมง">
                </div>

                <button type="button" class="btn btn-submit-custom w-100 fs-5" id="submitBtn" onclick="submitStep1()">💾 ยืนยันการเตรียมเครื่อง</button>
            </form>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    
    window.onload = function() {
        if(localStorage.getItem("userRole") !== "Admin") { 
            Swal.fire("ปฏิเสธการเข้าถึง", "เฉพาะแอดมินเท่านั้น", "error").then(() => window.location.href="index.html"); 
            return; 
        }
        loadUsersAndIpads();
    };

    function loadUsersAndIpads() {
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getUserNames" }) })
        .then(res => res.json())
        .then(res => {
            const select = document.getElementById("userNameSelect");
            select.innerHTML = '<option value="">-- เลือกชื่อผู้ขอยืม --</option>';
            if(res.status === "success" && res.data.length > 0) {
                res.data.forEach(name => { select.innerHTML += `<option value="${name}">${name}</option>`; });
            }
        });

        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getInventory" }) })
        .then(res => res.json())
        .then(res => {
            const container = document.getElementById("ipadButtonContainer");
            container.innerHTML = "";
            
            if(res.status === "success" && res.data.length > 0) {
                res.data.forEach(id => { 
                    container.innerHTML += `
                        <input type="checkbox" class="btn-check ipad-checkbox" id="ipad-${id}" value="${id}" onchange="handleIpadSelection(this)">
                        <label class="btn btn-outline-teal px-3 py-2" for="ipad-${id}">${id}</label>
                    `;
                });
            } else { 
                container.innerHTML = '<div class="text-danger w-100 text-center py-3 fw-bold">❌ ไม่มีเครื่องว่างในคลังขณะนี้</div>'; 
            }
        });
    }

    // 📌 ฟังก์ชันจัดการเมื่อติ๊กเลือก iPad
    function handleIpadSelection(checkbox) {
        const ipadId = checkbox.value;
        const tbody = document.getElementById("dynamicChecklistBody");
        const container = document.getElementById("dynamicChecklistContainer");
        const count = document.querySelectorAll('.ipad-checkbox:checked').length;
        
        // อัปเดตตัวเลข "เลือกแล้ว X เครื่อง"
        const badge = document.getElementById('selectedCount');
        badge.innerText = `เลือกแล้ว ${count} เครื่อง`;
        badge.className = count > 0 ? "badge bg-success" : "badge bg-secondary";

        if (checkbox.checked) {
            // สร้างแถวใหม่เพิ่มเข้าไปในตาราง
            const tr = document.createElement("tr");
            tr.id = `row-${ipadId}`;
            tr.innerHTML = `
                <td class="fw-bold text-primary">${ipadId}</td>
                <td><input type="checkbox" class="form-check-input check-${ipadId}" value="drive"></td>
                <td><input type="checkbox" class="form-check-input check-${ipadId}" value="file"></td>
                <td><input type="checkbox" class="form-check-input check-${ipadId}" value="img"></td>
                <td><input type="checkbox" class="form-check-input check-${ipadId}" value="safari"></td>
                <td><button type="button" class="btn btn-sm btn-outline-teal fw-bold rounded-pill" onclick="tickAllRow('${ipadId}')">✔ ติ๊กครบ</button></td>
            `;
            tbody.appendChild(tr);
        } else {
            // เอาแถวออกถ้าเลิกติ๊ก
            const tr = document.getElementById(`row-${ipadId}`);
            if (tr) tr.remove();
        }

        // ซ่อน/แสดง ตารางเช็คลิสต์
        if (count > 0) {
            container.classList.remove('d-none');
        } else {
            container.classList.add('d-none');
        }
    }

    // 📌 ฟังก์ชันติ๊กครบทั้งแถวสำหรับเครื่องนั้นๆ
    function tickAllRow(ipadId) {
        const checkboxes = document.querySelectorAll(`.check-${ipadId}`);
        checkboxes.forEach(cb => cb.checked = true);
    }

    function submitStep1() {
        const recipientName = document.getElementById("userNameSelect").value;
        const note = document.getElementById("noteInput").value;
        const adminName = localStorage.getItem("userName") || "Admin";
        
        const selectedIpads = Array.from(document.querySelectorAll('.ipad-checkbox:checked')).map(cb => cb.value);

        if(!recipientName) return Swal.fire("แจ้งเตือน", "กรุณาเลือกชื่อผู้ขอยืม", "warning");
        if(selectedIpads.length === 0) return Swal.fire("แจ้งเตือน", "กรุณากดเลือก iPad อย่างน้อย 1 เครื่อง", "warning");
        
        // 📌 เช็คว่าติ๊กครบทุกเครื่องที่เลือกหรือไม่
        let allChecked = true;
        const ipadData = [];

        selectedIpads.forEach(id => {
            const checks = document.querySelectorAll(`.check-${id}`);
            if (checks.length > 0) {
                const drive = checks[0].checked;
                const file = checks[1].checked;
                const img = checks[2].checked;
                const safari = checks[3].checked;
                
                if (!drive || !file || !img || !safari) allChecked = false;
                
                ipadData.push({
                    id: id,
                    drive: drive,
                    file: file,
                    img: img,
                    safari: safari
                });
            }
        });

        if(!allChecked) return Swal.fire("แจ้งเตือน", "กรุณาติ๊กเตรียมเครื่องให้ครบทุกข้อ ของทุกเครื่องที่เลือกครับ", "warning");

        const btn = document.getElementById("submitBtn");
        btn.innerHTML = "กำลังบันทึกข้อมูล... ⏳";
        btn.disabled = true;

        const payload = {
            action: "saveStep1",
            adminName: adminName,
            recipientName: recipientName,
            note: note ? `เตรียมให้: ${recipientName} (${selectedIpads.length} เครื่อง) | ` + note : `เตรียมให้: ${recipientName} (${selectedIpads.length} เครื่อง)`,
            ipadData: ipadData
        };

        fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                Swal.fire({
                    title: "บันทึกสำเร็จ!",
                    html: `หมายเลขรายการ: <b>${res.reqId}</b><br>ระบบได้ส่งแจ้งเตือนไปที่ LINE ของผู้ยืมแล้ว`,
                    icon: "success",
                    confirmButtonColor: "#00897b"
                }).then(() => {
                    window.location.href = "admin.html";
                });
            } else {
                Swal.fire("ข้อผิดพลาด", res.message, "error");
                btn.innerHTML = "💾 ยืนยันการเตรียมเครื่อง";
                btn.disabled = false;
            }
        }).catch(err => {
            Swal.fire("ขัดข้อง", "ระบบขัดข้องในการเชื่อมต่อเซิร์ฟเวอร์", "error");
            btn.innerHTML = "💾 ยืนยันการเตรียมเครื่อง";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
