<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งสถานะเครื่องมีปัญหา</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { 
            font-family: 'Sarabun', sans-serif; 
            background-color: #f4f6f9; 
            padding: 20px; 
            color: #333;
        }
        
        /* ธีมสีส้ม/เหลือง สำหรับการแจ้งปัญหา */
        .card-custom { 
            background: white; 
            border: none; 
            border-radius: 12px; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); 
            border-top: 6px solid #f59e0b; 
        }
        
        .form-label { font-weight: 600; color: #495057; }
        
        .btn-submit-custom {
            background-color: #f59e0b;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            padding: 12px;
            transition: 0.3s;
        }
        .btn-submit-custom:hover {
            background-color: #d97706;
            color: white;
        }

        .alert-box {
            background-color: #fffbeb;
            border: 1px solid #fde68a;
            border-left: 4px solid #f59e0b;
            color: #92400e;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-size: 0.95rem;
        }
    </style>
</head>
<body>
    
    <div class="container my-4" style="max-width: 700px;">
        <!-- 📌 Header -->
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-dark fw-bold mb-0">⚠️ แจ้งสถานะเครื่องมีปัญหา</h3>
            <a href="admin.html" class="btn btn-secondary px-4 fw-bold rounded-pill">🔙 กลับหน้าแอดมิน</a>
        </div>
        
        <!-- 📌 Main Card -->
        <div class="card card-custom p-4 p-md-5 mx-auto">
            
            <div class="alert-box">
                <strong>คำแนะนำ:</strong> ใช้ฟอร์มนี้เพื่ออัปเดตสถานะกรณีพบความเสียหาย, เครื่องสูญหาย, หรือต้องการส่งซ่อม ระบบจะเปลี่ยนสถานะเครื่องนี้ไม่ให้ถูกนำไปเบิก-ยืมได้
            </div>

            <form id="issueForm">
                
                <div class="mb-4">
                    <label class="form-label">📱 เลือกรหัส iPad ที่มีปัญหา:</label>
                    <select id="ipadIdSelect" class="form-select form-select-lg" required>
                        <option value="">-- กรุณาเลือกรหัส iPad --</option>
                        <!-- ตัวเลือกจะถูกสร้างอัตโนมัติด้วย JavaScript -->
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">🚨 ประเภทของปัญหา:</label>
                    <select id="issueType" class="form-select form-select-lg" required>
                        <option value="">-- เลือกประเภทปัญหา --</option>
                        <option value="หน้าจอแตก/เสียหาย">📱 หน้าจอแตก / เสียหาย</option>
                        <option value="แบตเตอรี่เสื่อม/เปิดไม่ติด">🔋 แบตเตอรี่เสื่อม / เปิดไม่ติด</option>
                        <option value="ระบบรวน/แอปค้าง">⚙️ ระบบรวน / แอปค้าง</option>
                        <option value="อุปกรณ์สูญหาย">❓ อุปกรณ์สูญหาย</option>
                        <option value="อื่นๆ (ระบุในหมายเหตุ)">📝 อื่นๆ (ระบุในหมายเหตุ)</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">📝 รายละเอียดเพิ่มเติม / อาการที่พบ:</label>
                    <textarea id="issueNote" class="form-control" rows="4" placeholder="เช่น รอยร้าวที่มุมขวาล่าง, ชาร์จแบตไม่เข้า, หรือชื่อผู้ใช้งานทำหล่น..."></textarea>
                </div>

                <button type="button" class="btn btn-submit-custom w-100 fs-5 mt-2" id="submitBtn" onclick="submitIssue()">💾 บันทึกและอัปเดตสถานะ</button>
            </form>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
    // ตั้งค่า URL ของ Google Apps Script ของพี่
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    
    window.onload = function() {
        if(localStorage.getItem("userRole") !== "Admin") { 
            Swal.fire("ปฏิเสธการเข้าถึง", "เฉพาะแอดมินเท่านั้น", "error").then(() => window.location.href="index.html"); 
            return; 
        }
        generateIpadList();
    };

    // 📌 ฟังก์ชันสร้างรายชื่อ iPad ใส่ใน Dropdown ให้อัตโนมัติ (1-80)
    function generateIpadList() {
        const select = document.getElementById("ipadIdSelect");
        
        // หมวดหมู่ปกติ (IPad01 - IPad60)
        const optgroupNormal = document.createElement("optgroup");
        optgroupNormal.label = "🔹 หมวด iPad (ปกติ)";
        for (let i = 1; i <= 60; i++) {
            let num = i.toString().padStart(2, '0');
            let option = document.createElement("option");
            option.value = `IPad${num}`;
            option.text = `IPad${num}`;
            optgroupNormal.appendChild(option);
        }
        select.appendChild(optgroupNormal);

        // หมวดหมู่ Air + APC (IPad Air + APC 61 - 80)
        const optgroupAir = document.createElement("optgroup");
        optgroupAir.label = "🔹 หมวด iPad Air + APC";
        for (let i = 61; i <= 80; i++) {
            let option = document.createElement("option");
            option.value = `IPad Air + APC ${i}`;
            option.text = `IPad Air + APC ${i}`;
            optgroupAir.appendChild(option);
        }
        select.appendChild(optgroupAir);
    }

    // 📌 ฟังก์ชันบันทึกข้อมูล
    function submitIssue() {
        const ipadId = document.getElementById("ipadIdSelect").value;
        const issueType = document.getElementById("issueType").value;
        const note = document.getElementById("issueNote").value;
        const adminName = localStorage.getItem("userName") || "Admin";

        if(!ipadId) return Swal.fire("แจ้งเตือน", "กรุณาเลือกรหัส iPad", "warning");
        if(!issueType) return Swal.fire("แจ้งเตือน", "กรุณาเลือกประเภทปัญหา", "warning");

        const btn = document.getElementById("submitBtn");
        btn.innerHTML = "กำลังบันทึกข้อมูล... ⏳";
        btn.disabled = true;

        // เตรียม Payload ส่งไปหลังบ้าน (สร้าง Action ใหม่ชื่อ 'reportIssue')
        const payload = {
            action: "reportIssue",
            adminName: adminName,
            ipadId: ipadId,
            issueType: issueType,
            note: note
        };

        fetch(API_URL, { 
            method: "POST", 
            body: JSON.stringify(payload) 
        })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                Swal.fire({
                    title: "บันทึกสำเร็จ!",
                    text: `อัปเดตสถานะเครื่อง ${ipadId} เป็น "ส่งซ่อม/มีปัญหา" เรียบร้อยแล้ว`,
                    icon: "success",
                    confirmButtonColor: "#00897b"
                }).then(() => {
                    window.location.href = "admin.html";
                });
            } else {
                Swal.fire("ข้อผิดพลาด", res.message || "ไม่สามารถบันทึกข้อมูลได้", "error");
                btn.innerHTML = "💾 บันทึกและอัปเดตสถานะ";
                btn.disabled = false;
            }
        }).catch(err => {
            Swal.fire("ขัดข้อง", "ระบบขัดข้องในการเชื่อมต่อเซิร์ฟเวอร์", "error");
            btn.innerHTML = "💾 บันทึกและอัปเดตสถานะ";
            btn.disabled = false;
        });
    }
</script>
</body>
</html>
