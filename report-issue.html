<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แจ้งสถานะเครื่องมีปัญหา</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #fdf2f2; padding: 20px; color: #333; }
        .card-custom { background: white; border: none; border-radius: 12px; box-shadow: 0 4px 15px rgba(220,53,69,0.05); border-top: 6px solid #dc3545; }
        .form-label { font-weight: 600; color: #495057; }
        
        .btn-submit-custom { background-color: #dc3545; color: white; font-weight: bold; border: none; border-radius: 8px; padding: 12px; transition: 0.3s; }
        .btn-submit-custom:hover { background-color: #b91c1c; color: white; }

        .alert-box { background-color: #fef2f2; border: 1px solid #fecaca; border-left: 4px solid #dc3545; color: #991b1b; padding: 15px; border-radius: 8px; margin-bottom: 25px; font-size: 0.95rem; }

        .btn-outline-danger, .btn-outline-secondary { transition: 0.2s; border-width: 2px; border-radius: 10px; }
        .btn-check:checked + .btn-outline-danger { background-color: #fdf2f2; border-color: #dc3545; color: #dc3545; }
        .btn-check:checked + .btn-outline-secondary { background-color: #f8f9fa; border-color: #495057; color: #495057; }
        .cat-subtitle { font-size: 0.8rem; display: block; margin-top: 5px; }
    </style>
</head>
<body>
    
    <div class="container my-4" style="max-width: 700px;">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="text-danger fw-bold mb-0">⚠️ แจ้งสถานะเครื่องมีปัญหา</h3>
            <a href="admin.html" class="btn btn-outline-danger px-4 fw-bold rounded-pill border-2">🔙 กลับหน้าแอดมิน</a>
        </div>
        
        <div class="card card-custom p-4 p-md-5 mx-auto">
            
            <div class="alert-box">
                <strong>คำแนะนำ:</strong> ใช้ฟอร์มนี้เพื่ออัปเดตสถานะกรณีพบความเสียหาย หรือต้องการบันทึกประวัติเครื่อง
            </div>

            <form id="issueForm">
                
                <div class="mb-4">
                    <label class="form-label">📌 เลือกหมวดหมู่การแจ้ง:</label>
                    <div class="row g-3">
                        <div class="col-sm-6">
                            <input type="radio" class="btn-check" name="reportCategory" id="catRepair" value="repair" checked>
                            <label class="btn btn-outline-danger w-100 text-start p-3 fw-bold shadow-sm" for="catRepair">
                                🛠️ แจ้งส่งซ่อม
                                <span class="cat-subtitle text-muted fw-normal">ระบบจะระงับการยืมเครื่องนี้ และตัดออกจากหน้าเตรียมเครื่อง</span>
                            </label>
                        </div>
                        <div class="col-sm-6">
                            <input type="radio" class="btn-check" name="reportCategory" id="catReport" value="report">
                            <label class="btn btn-outline-secondary w-100 text-start p-3 fw-bold shadow-sm" for="catReport">
                                📝 รายงานเฉยๆ
                                <span class="cat-subtitle text-muted fw-normal">แค่จดประวัติไว้ เครื่องนี้ยังสามารถให้คนอื่นเบิกยืมได้ปกติ</span>
                            </label>
                        </div>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label">📱 เลือกรหัส iPad ที่มีปัญหา:</label>
                    <select id="ipadIdSelect" class="form-select form-select-lg" required>
                        <option value="">-- กรุณาเลือกรหัส iPad --</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">🚨 ประเภทของปัญหา:</label>
                    <select id="issueType" class="form-select form-select-lg" required>
                        <option value="">-- เลือกประเภทปัญหา --</option>
                        <option value="หน้าจอแตก/เสียหาย">📱 หน้าจอแตก / เสียหาย</option>
                        <option value="แบตเตอรี่เสื่อม/เปิดไม่ติด">🔋 แบตเตอรี่เสื่อม / เปิดไม่ติด</option>
                        <option value="ระบบรวน/แอปค้าง">⚙️ ระบบรวน / แอปค้าง</option>
                        <option value="อุปกรณ์สูญหาย">❓ อุปกรณ์สูญหาย</option>
                        <option value="อื่นๆ (ระบุในหมายเหตุ)">📝 อื่นๆ (ระบุในหมายเหตุ)</option>
                    </select>
                </div>

                <div class="mb-4">
                    <label class="form-label">📝 รายละเอียดเพิ่มเติม / อาการที่พบ:</label>
                    <textarea id="issueNote" class="form-control" rows="4" placeholder="เช่น รอยร้าวที่มุมขวาล่าง, ชาร์จแบตไม่เข้า, หรือชื่อผู้ใช้งานทำหล่น..."></textarea>
                </div>

                <button type="button" class="btn btn-submit-custom w-100 fs-5 mt-2 shadow" id="submitBtn" onclick="submitIssue()">💾 บันทึกข้อมูล</button>
            </form>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    
    window.onload = function() {
        if(localStorage.getItem("userRole") !== "Admin") { 
            Swal.fire("ปฏิเสธการเข้าถึง", "เฉพาะแอดมินเท่านั้น", "error").then(() => window.location.href="index.html"); 
            return; 
        }
        generateIpadList();
    };

    function generateIpadList() {
        const select = document.getElementById("ipadIdSelect");
        
        const optgroupNormal = document.createElement("optgroup");
        optgroupNormal.label = "🔹 หมวด iPad (ปกติ)";
        for (let i = 1; i <= 60; i++) {
            let num = i.toString().padStart(2, '0');
            let option = document.createElement("option");
            option.value = `IPad${num}`; option.text = `IPad${num}`;
            optgroupNormal.appendChild(option);
        }
        select.appendChild(optgroupNormal);

        const optgroupAir = document.createElement("optgroup");
        optgroupAir.label = "🔹 หมวด iPad Air + APC";
        for (let i = 61; i <= 80; i++) {
            let option = document.createElement("option");
            option.value = `IPad Air + APC ${i}`; option.text = `IPad Air + APC ${i}`;
            optgroupAir.appendChild(option);
        }
        select.appendChild(optgroupAir);
    }

    function submitIssue() {
        const reportCategory = document.querySelector('input[name="reportCategory"]:checked').value;
        const ipadId = document.getElementById("ipadIdSelect").value;
        const issueType = document.getElementById("issueType").value;
        const note = document.getElementById("issueNote").value;
        const adminName = localStorage.getItem("userName") || "Admin";

        if(!ipadId) return Swal.fire("แจ้งเตือน", "กรุณาเลือกรหัส iPad", "warning");
        if(!issueType) return Swal.fire("แจ้งเตือน", "กรุณาเลือกประเภทปัญหา", "warning");

        const btn = document.getElementById("submitBtn");
        btn.innerHTML = "กำลังบันทึกข้อมูล... ⏳";
        btn.disabled = true;

        const payload = {
            action: "reportIssue", adminName: adminName, ipadId: ipadId, issueType: issueType, note: note, reportCategory: reportCategory
        };

        fetch(API_URL, { method: "POST", body: JSON.stringify(payload) })
        .then(res => res.json())
        .then(res => {
            if(res.status === "success") {
                Swal.fire({ title: "บันทึกสำเร็จ!", text: res.message, icon: "success", confirmButtonColor: "#dc3545" })
                .then(() => { window.location.href = "admin.html"; });
            } else {
                Swal.fire("ข้อผิดพลาด", res.message || "ไม่สามารถบันทึกข้อมูลได้", "error");
                btn.innerHTML = "💾 บันทึกข้อมูล"; btn.disabled = false;
            }
        }).catch(err => {
            Swal.fire("ขัดข้อง", "ระบบขัดข้องในการเชื่อมต่อเซิร์ฟเวอร์", "error");
            btn.innerHTML = "💾 บันทึกข้อมูล"; btn.disabled = false;
        });
    }
</script>
</body>
</html>
