<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายการรอตรวจสอบคืนเครื่อง - Step 5</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Sarabun', sans-serif; background-color: #f4f6f9; padding: 20px; }
        .card { border: none; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.08); }
        
        /* เปลี่ยนสีหัวตารางเป็นธีมสีเขียวอมฟ้า (Teal) ของ Step 5 */
        .table th { background-color: #00897b; color: white; font-weight: 600; text-align: center; border-bottom: none; }
        
        .table td { vertical-align: middle; text-align: center; }
        .status-badge { padding: 6px 12px; border-radius: 20px; font-size: 0.85rem; font-weight: bold; background-color: #f8d7da; color: #842029; }
        
        .btn-check-ipad { background-color: #00897b; color: white; border: none; font-weight: bold; }
        .btn-check-ipad:hover { background-color: #00695c; color: white; }
    </style>
</head>
<body>

<div class="container my-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="text-dark fw-bold mb-0">📋 รายการรอตรวจสอบคืน (ค้างดำเนินการ)</h2>
        <a href="admin.html" class="btn btn-secondary px-4">🔙 กลับหน้าแอดมิน</a>
    </div>

    <div class="card p-4">
        <div class="table-responsive">
            <table class="table table-hover table-striped">
                <thead>
                    <tr>
                        <th style="width: 15%; border-top-left-radius: 8px;">เลขรายการ</th>
                        <th style="width: 20%;">วัน-เวลาที่ส่งคืน</th>
                        <th style="width: 25%;">ชื่อผู้ส่งคืน</th>
                        <th style="width: 13%;">จำนวน (เครื่อง)</th>
                        <th style="width: 12%;">สถานะ</th>
                        <th style="width: 15%; border-top-right-radius: 8px;">การจัดการ</th>
                    </tr>
                </thead>
                <tbody id="requestListBody">
                    <tr>
                        <td colspan="6" class="text-muted py-4">กำลังดึงข้อมูลรายการส่งคืนจากระบบ...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // ⚠️ ลิงก์ API ตัวล่าสุด
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    let pendingRequests = [];

    window.onload = async function() {
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "getData" })
            });
            const result = await res.json();
            const tbody = document.getElementById("requestListBody");
            tbody.innerHTML = "";

            if (result.status === "success" && result.data.length > 0) {
                // กรองเอาเฉพาะรายการที่ค้างตรวจสอบ (ผ่าน Step 4 มาแล้ว)
                pendingRequests = result.data.filter(item => item.status === "Step[4]" || item.status === "ส่งคืนแล้ว");

                if (pendingRequests.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="6" class="text-success fw-bold py-4">🎉 ไม่มีรายการส่งคืนที่ค้างตรวจสอบในขณะนี้</td></tr>';
                    return;
                }

                pendingRequests.forEach((req, idx) => {
                    const countText = req.note ? req.note.replace(/[^0-9]/g, '') : "1";
                    const count = parseInt(countText) || 1;

                    const tr = document.createElement("tr");
                    tr.innerHTML = `
                        <td><span class="badge bg-dark fs-6">${req.reqId}</span></td> 
                        <td>${req.timestamp}</td>
                        <td class="text-start fw-bold text-primary">${req.name}</td>
                        <td><span class="badge bg-secondary fs-6">${count} เครื่อง</span></td>
                        <td><span class="status-badge">${req.status}</span></td>
                        <td>
                            <button class="btn btn-check-ipad btn-sm px-3 shadow-sm" onclick="proceedToCheck('${req.reqId}')">
                                🔍 ตรวจสอบเครื่อง
                            </button>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="6" class="text-danger py-4">❌ ไม่พบข้อมูลการเบิกในระบบ หรือเกิดข้อผิดพลาด</td></tr>';
            }
        } catch (error) {
            console.error("Error fetching data:", error);
            document.getElementById("requestListBody").innerHTML = '<tr><td colspan="6" class="text-danger py-4">❌ เกิดข้อผิดพลาดในการเชื่อมต่อฐานข้อมูล</td></tr>';
        }
    };

    function proceedToCheck(reqId) {
        // เด้งไปหน้า Step 5 พร้อมส่งเลขรายการไปให้
        window.location.href = `step5.html?reqId=${reqId}`;
    }
</script>
</body>
</html>
