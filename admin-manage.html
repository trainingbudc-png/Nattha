<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>จัดการรอยืนยัน (Admin)</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="theme-admin.css">
    <style>
        @media screen and (max-width: 768px) {
            .navbar-custom { flex-direction: column; gap: 15px; text-align: center; }
            .table-responsive { border: none !important; background: transparent !important; padding: 0 !important; }
            .table thead { display: none; }
            .table tbody tr { display: block; background: white; border-radius: 12px; margin-bottom: 15px; padding: 15px; box-shadow: 0 4px 12px rgba(220,53,69,0.1); border: 1px solid #fecaca; }
            .table tbody td { display: flex; justify-content: space-between; align-items: flex-start; text-align: right; padding: 10px 0; border-bottom: 1px dashed #fee2e2; }
            .table tbody td:last-child { border-bottom: none; padding-bottom: 0; }
            .table tbody td::before { content: attr(data-label); font-weight: 600; color: #b91c1c; font-size: 0.95rem; text-align: left; margin-right: 15px; flex-shrink: 0; }
            .btn-sm { padding: 10px !important; margin-top: 5px; width: 100%; }
        }
    </style>
</head>
<body>

    <nav class="navbar navbar-custom d-flex justify-content-between align-items-center">
        <div class="fw-bold fs-5 text-danger">
            ⚙️ จัดการรายการเตรียมเครื่อง
        </div>
        <a href="admin.html" class="btn btn-outline-danger btn-sm rounded-pill fw-bold px-4 border-2">🔙 กลับ</a>
    </nav>

    <div class="container pb-5 mt-4" style="max-width: 1100px;">
        <div class="section-title">รายการที่ "รอแอดมินยืนยันการเตรียม"</div>
        <p class="text-muted mb-4 px-2" style="font-size: 0.9rem;">
            * เมื่อคุณกดยืนยัน ระบบจะส่งข้อความแจ้งเตือนไปที่ LINE ของผู้ขอเบิกยืมทันที <br>
            * หากกดยกเลิก ระบบจะคืนสถานะอุปกรณ์เหล่านั้นกลับเป็น "ว่าง"
        </p>
        
        <div class="table-card table-responsive">
            <table class="table table-hover align-middle">
                <thead>
                    <tr>
                        <th style="width: 15%;">เลขรายการ</th>
                        <th style="width: 20%;">วัน-เวลา</th>
                        <th style="width: 30%;">รหัส iPad</th>
                        <th style="width: 15%;">ผู้ยืม</th>
                        <th style="width: 20%;">จัดการ (ยืนยัน/ยกเลิก)</th>
                    </tr>
                </thead>
                <tbody id="manageTableBody">
                    <tr><td colspan="5" class="text-center py-5 text-muted">กำลังโหลดข้อมูล... ⏳</td></tr>
                </tbody>
            </table>
        </div>
    </div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    const currentAdmin = localStorage.getItem("userName") || "Admin";

    window.onload = function() {
        if(localStorage.getItem("userRole") !== "Admin") {
            window.location.href = "index.html"; 
            return;
        }
        loadPendingData();
    };

    function loadPendingData() {
        const tbody = document.getElementById("manageTableBody");
        fetch(API_URL, { method: "POST", body: JSON.stringify({ action: "getData" }) })
        .then(res => res.json())
        .then(res => {
            tbody.innerHTML = ""; 
            if (res.status === "success" && res.data && res.data.length > 0) {
                const pendingData = res.data.filter(item => item.status && item.status.includes("รอแอดมินยืนยัน"));

                if (pendingData.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="text-center text-success fw-bold py-5">🎉 ไม่มีรายการที่รอยืนยันในขณะนี้</td></tr>';
                    return;
                }

                pendingData.forEach(item => {
                    let dateStr = item.timestamp ? new Date(item.timestamp).toLocaleString("th-TH") : "-";
                    let formattedIpads = formatIpadText(item.ipadId);

                    // 📌 เพิ่ม data-label ให้รองรับจอมือถือ
                    tbody.innerHTML += `
                        <tr>
                            <td data-label="เลขรายการ" class="fw-bold text-dark">${item.reqId}</td>
                            <td data-label="วัน-เวลา" class="text-muted" style="font-size: 0.85rem;">${dateStr}</td>
                            <td data-label="รหัส iPad" style="max-width: 100%; line-height: 1.6;">${formattedIpads}</td>
                            <td data-label="ผู้ยืม" class="fw-bold text-primary">${item.name || "-"}</td>
                            <td data-label="จัดการ">
                                <div class="d-flex flex-column gap-2 px-1">
                                    <button class="btn btn-success btn-sm fw-bold rounded-3 shadow-sm" onclick="confirmStep1('${item.reqId}')">✅ ยืนยัน (ส่ง LINE)</button>
                                    <button class="btn btn-outline-danger btn-sm fw-bold rounded-3 bg-white" onclick="cancelStep1('${item.reqId}')">❌ ยกเลิกรายการ</button>
                                </div>
                            </td>
                        </tr>
                    `;
                });
            } else {
                tbody.innerHTML = '<tr><td colspan="5" class="text-center text-muted py-5">ไม่มีข้อมูลในระบบ</td></tr>';
            }
        });
    }

    function formatIpadText(ipadText) {
        if (!ipadText || ipadText.trim() === "") return "-";
        let rawIpads = ipadText.split(',').map(id => id.trim());
        let normalIds = [], airIds = [];
        rawIpads.forEach(id => {
            let numMatch = id.match(/\d+/); 
            let num = numMatch ? numMatch[0] : id; 
            if (id.toLowerCase().includes("air") || id.toLowerCase().includes("apc")) airIds.push(num);
            else normalIds.push(num);
        });
        let displayGroups = [];
        if (normalIds.length > 0) displayGroups.push(`<span class="text-danger fw-bold">[iPad]</span> ${normalIds.join(', ')}`);
        if (airIds.length > 0) displayGroups.push(`<span class="text-dark fw-bold">[Air+APC]</span> ${airIds.join(', ')}`);
        return displayGroups.join('<br>');
    }

    function confirmStep1(reqId) {
        Swal.fire({
            title: "ยืนยันการเตรียมเครื่อง?",
            text: `ระบบจะส่งข้อความแจ้งเตือนไปให้ผู้ยืมผ่าน LINE ทันที`,
            icon: "info",
            showCancelButton: true,
            confirmButtonColor: "#198754",
            cancelButtonColor: "#6c757d",
            confirmButtonText: "ใช่, ยืนยันเลย!"
        }).then((result) => {
            if (result.isConfirmed) processAction("confirmStep1", reqId, "กำลังส่งแจ้งเตือน... ⏳", "ส่งข้อความ LINE สำเร็จ!");
        });
    }

    function cancelStep1(reqId) {
        Swal.fire({
            title: "ยกเลิกรายการนี้?",
            text: `อุปกรณ์ทั้งหมดในรายการ ${reqId} จะถูกเปลี่ยนสถานะเป็น "ว่าง" และกลับคืนสู่คลังทันที`,
            icon: "warning",
            showCancelButton: true,
            confirmButtonColor: "#dc3545",
            cancelButtonColor: "#6c757d",
            confirmButtonText: "ใช่, ยกเลิกและคืนคลัง!"
        }).then((result) => {
            if (result.isConfirmed) processAction("cancelStep1", reqId, "กำลังยกเลิกและคืนเครื่อง... ⏳", "ยกเลิกรายการสำเร็จ!");
        });
    }

    function processAction(actionType, reqId, loadingText, successText) {
        Swal.fire({ title: loadingText, allowOutsideClick: false, didOpen: () => { Swal.showLoading(); } });
        fetch(API_URL, {
            method: "POST",
            body: JSON.stringify({ action: actionType, reqId: reqId, adminName: currentAdmin })
        })
        .then(res => res.json())
        .then(res => {
            if (res.status === "success") Swal.fire("สำเร็จ!", successText, "success").then(() => loadPendingData());
            else Swal.fire("เกิดข้อผิดพลาด", res.message, "error");
        }).catch(err => {
            Swal.fire("ข้อผิดพลาด", "ไม่สามารถเชื่อมต่อเซิร์ฟเวอร์ได้", "error");
        });
    }
</script>
</body>
</html>
