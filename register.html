<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน | iPad Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Kanit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px 0; }
        .register-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 450px; border-top: 5px solid #10b981; }
        .form-control { border-radius: 10px; padding: 12px; border: 1px solid #e2e8f0; }
        .form-control:focus { border-color: #10b981; box-shadow: 0 0 0 0.25rem rgba(16, 185, 129, 0.25); }
        .btn-success { background: #10b981; border: none; border-radius: 10px; padding: 12px; font-weight: bold; font-size: 1.1rem; width: 100%; transition: 0.3s; margin-top: 15px; }
        .btn-success:hover { background: #059669; }
        .form-label { font-weight: 600; color: #475569; font-size: 0.9rem; margin-bottom: 5px; }
        .back-link { text-align: center; margin-top: 20px; font-size: 0.9rem; }
        .back-link a { color: #64748b; text-decoration: none; font-weight: bold; }
        .back-link a:hover { text-decoration: underline; color: #475569; }
    </style>
</head>
<body>

<div class="register-card">
    <h4 class="text-center fw-bold text-dark mb-1">📝 ลงทะเบียนผู้ใช้ใหม่</h4>
    <p class="text-center text-muted mb-4" style="font-size: 0.85rem;">กรอกข้อมูลเพื่อเปิดสิทธิ์การใช้งานระบบ</p>
    
    <div class="mb-3">
        <label class="form-label">ชื่อ-นามสกุล (ใช้เป็นชื่อล็อกอิน)</label>
        <input type="text" id="regName" class="form-control" placeholder="กรอกชื่อ-นามสกุลของคุณ">
    </div>
    <div class="mb-3">
        <label class="form-label">ฝ่าย / แผนก</label>
        <input type="text" id="regDept" class="form-control" placeholder="เช่น ไอที, ทันตกรรม, ศัลยกรรม">
    </div>
    <div class="mb-4">
        <label class="form-label">เบอร์ติดต่อภายใน (หรือเบอร์มือถือ)</label>
        <input type="text" id="regPhone" class="form-control" placeholder="กรอกเบอร์ที่สามารถติดต่อได้">
    </div>
    
    <button class="btn btn-success" id="btnRegister" onclick="register()">✅ ลงทะเบียน & เข้าใช้งาน</button>
    
    <div class="back-link">
        <a href="index.html">🔙 กลับไปหน้าเข้าสู่ระบบ</a>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";

    async function register() {
        const name = document.getElementById('regName').value.trim();
        const dept = document.getElementById('regDept').value.trim();
        const phone = document.getElementById('regPhone').value.trim();

        if (!name || !dept || !phone) {
            return alert("⚠️ กรุณากรอกข้อมูลให้ครบถ้วนทุกช่องครับ");
        }

        const btn = document.getElementById('btnRegister');
        btn.innerText = "⏳ กำลังบันทึกข้อมูล..."; 
        btn.disabled = true;

        // สร้าง User ID อัตโนมัติแบบสุ่มตัวเลข 4 หลักต่อท้าย (เช่น USR-5821)
        const autoUserId = "USR-" + Math.floor(1000 + Math.random() * 9000);
        // กำหนดสิทธิ์ให้เป็น User ธรรมดาเสมอ
        const fixedRole = "User";

        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ 
                    action: "registerUser", 
                    userId: autoUserId, 
                    name: name, 
                    role: fixedRole, 
                    dept: dept, 
                    phone: phone 
                })
            });
            const data = await res.json();

            if (data.status === "success") {
                alert("✅ ลงทะเบียนสำเร็จ! ระบบกำลังพาท่านเข้าสู่หน้าเบิกยืม...");
                // บันทึกข้อมูลลงเครื่องและพาไปหน้า user.html ทันที
                localStorage.setItem("userName", name);
                localStorage.setItem("userRole", fixedRole);
                window.location.href = "user.html";
            } else {
                alert("❌ " + data.message);
                btn.innerText = "✅ ลงทะเบียน & เข้าใช้งาน"; 
                btn.disabled = false;
            }
        } catch (error) {
            alert("❌ เกิดข้อผิดพลาดในการเชื่อมต่อ");
            btn.innerText = "✅ ลงทะเบียน & เข้าใช้งาน"; 
            btn.disabled = false;
        }
    }
</script>
</body>
</html>
