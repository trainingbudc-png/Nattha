<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE Login | iPad Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Kanit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
        .line-icon { width: 80px; height: 80px; margin-bottom: 20px; }
        .loading-text { font-size: 1.2rem; font-weight: bold; color: #475569; margin-top: 20px; }
        
        /* อนิเมชันโหลดดิ้งแบบเนียนๆ */
        .spinner-grow { color: #06C755; width: 3rem; height: 3rem; }
        .status-msg { font-size: 0.9rem; color: #94a3b8; margin-top: 10px; }
    </style>
</head>
<body>

<div class="login-card">
    <img src="https://upload.wikimedia.org/wikipedia/commons/4/41/LINE_logo.svg" alt="LINE" class="line-icon">
    
    <div id="loadingArea">
        <div class="spinner-grow" role="status">
            <span class="visually-hidden">Loading...</span>
        </div>
        <div class="loading-text" id="mainText">กำลังเข้าสู่ระบบด้วย LINE...</div>
        <div class="status-msg" id="subText">โปรดรอสักครู่ ระบบกำลังซิงค์ข้อมูล</div>
    </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyw2y3tAd1h-krTwcdjX67nxIWEH6ySWvKoErnJbjrxIvouq5cG8_smLZqrvJlcLvbE/exec";
    
    // ใส่ LIFF ID ของพี่เรียบร้อยแล้ว!
    const MY_LIFF_ID = "2010557323-PAyWhGxW"; 

    async function initializeLiff() {
        try {
            await liff.init({ liffId: MY_LIFF_ID });
            
            // ถ้ายังไม่ได้ล็อกอิน ให้เด้งไปหน้าล็อกอินของ LINE
            if (!liff.isLoggedIn()) {
                liff.login();
                return;
            }

            // ถ้าล็อกอินแล้ว ดึงข้อมูลโปรไฟล์ LINE
            const profile = await liff.getProfile();
            const displayName = profile.displayName;
            const userId = profile.userId.slice(0, 8); // ตัดเอาแค่ 8 ตัวแรกมาทำเป็น ID

            document.getElementById('subText').innerText = `สวัสดีคุณ ${displayName}`;
            
            // เรียกใช้ API เพื่อเช็คสิทธิ์หรือลงทะเบียนอัตโนมัติ
            authenticateUser(displayName, userId);

        } catch (err) {
            console.error("LIFF Initialization failed", err);
            document.getElementById('mainText').innerText = "❌ เกิดข้อผิดพลาด";
            document.getElementById('subText').innerText = "ไม่สามารถเชื่อมต่อกับ LINE ได้ กรุณาเปิดผ่านแอป LINE ครับ";
            document.querySelector('.spinner-grow').style.display = "none";
        }
    }

    async function authenticateUser(displayName, userId) {
        try {
            // 1. ลองเช็คสิทธิ์ดูก่อนว่าเคยมีชื่อในชีต Users หรือยัง
            const checkRes = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ action: "checkRole", name: displayName })
            });
            const checkData = await checkRes.json();

            if (checkData.success) {
                // 🟢 กรณีมีชื่อในระบบแล้ว -> เซฟชื่อลงเครื่องแล้วพาไปหน้า Dashboard เลย
                localStorage.setItem("userName", displayName);
                localStorage.setItem("userRole", checkData.role);
                
                document.getElementById('subText').innerText = "ยืนยันตัวตนสำเร็จ กำลังเข้าสู่ระบบ...";
                setTimeout(() => {
                    window.location.href = checkData.role === "Admin" ? "admin.html" : "user.html";
                }, 1000);
            } else {
                // 🔴 กรณีไม่มีชื่อในระบบ -> ให้ดึงข้อมูลไปลงทะเบียนให้เลยทันที
                document.getElementById('subText').innerText = "ผู้ใช้ใหม่... กำลังสร้างบัญชีอัตโนมัติ";
                
                const regRes = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ 
                        action: "registerUser", 
                        userId: "USR-" + userId, 
                        name: displayName, 
                        role: "User", // บังคับให้เป็น User ธรรมดา
                        dept: "-", 
                        phone: "-" 
                    })
                });
                const regData = await regRes.json();

                if (regData.status === "success") {
                    localStorage.setItem("userName", displayName);
                    localStorage.setItem("userRole", "User");
                    window.location.href = "user.html";
                } else {
                    document.getElementById('mainText').innerText = "❌ ลงทะเบียนล้มเหลว";
                    document.getElementById('subText').innerText = regData.message;
                }
            }
        } catch (error) {
            document.getElementById('mainText').innerText = "❌ เซิร์ฟเวอร์ไม่ตอบสนอง";
            document.getElementById('subText').innerText = "โปรดลองใหม่อีกครั้ง";
        }
    }

    // เริ่มทำงานทันทีที่เปิดหน้าเว็บ
    window.onload = () => {
        if(MY_LIFF_ID === "ใส่_LIFF_ID_ของพี่ตรงนี้") {
            document.getElementById('mainText').innerText = "⚠️ ลืมใส่ LIFF ID";
            document.getElementById('subText').innerText = "กรุณาแก้โค้ดใส่ LIFF ID ก่อนใช้งานจริงครับ";
            document.querySelector('.spinner-grow').style.display = "none";
        } else {
            initializeLiff();
        }
    };
</script>
</body>
</html>
