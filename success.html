<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทำรายการสำเร็จ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8fafc; font-family: 'Kanit', sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; padding: 20px; }
        .success-card { background: white; padding: 40px 30px; border-radius: 24px; box-shadow: 0 12px 40px rgba(0,0,0,0.06); width: 100%; max-width: 400px; text-align: center; border-top: 6px solid #10b981; }
        .success-icon { width: 80px; height: 80px; background-color: #10b981; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 40px; margin: 0 auto 20px; }
        .title-text { font-size: 1.5rem; font-weight: bold; color: #1e293b; margin-bottom: 10px; }
        .desc-text { color: #64748b; font-size: 0.95rem; margin-bottom: 30px; }
        .btn-close-app { background: #10b981; color: white; border-radius: 12px; padding: 14px; font-weight: bold; width: 100%; font-size: 1.1rem; border: none; }
        .btn-back { background: #f1f5f9; color: #475569; border-radius: 12px; padding: 14px; font-weight: bold; width: 100%; font-size: 1.1rem; border: none; margin-top: 12px; }
    </style>
</head>
<body>
<div class="success-card">
    <div class="success-icon">✓</div>
    <div class="title-text" id="msgTitle">ทำรายการสำเร็จ!</div>
    <div class="desc-text" id="msgDesc">บันทึกข้อมูลเรียบร้อยแล้ว</div>
    <div id="summaryArea" class="mb-4 p-3 bg-light rounded text-start" style="display:none; font-size: 0.9rem;">
        <div id="summaryContent"></div>
    </div>
    <button class="btn-close-app" onclick="closeApp()">ปิดหน้าต่างนี้</button>
    <button class="btn-back" onclick="goHome()">กลับเมนูหลัก</button>
</div>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
    const MY_LIFF_ID = "2010557323-PAyWhGxW"; 
    let homeUrl = localStorage.getItem("userRole") === "Admin" ? "admin.html" : "user.html";
    window.onload = async () => {
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('title')) document.getElementById('msgTitle').innerText = urlParams.get('title');
        if (urlParams.get('desc')) document.getElementById('msgDesc').innerText = urlParams.get('desc');
        if (urlParams.get('summary')) {
            document.getElementById('summaryArea').style.display = 'block';
            document.getElementById('summaryContent').innerHTML = urlParams.get('summary').replace(/\n/g, '<br>');
        }
        try { await liff.init({ liffId: MY_LIFF_ID }); } catch (err) {}
    };
    function closeApp() { liff.isInClient() ? liff.closeWindow() : window.location.href = homeUrl; }
    function goHome() { window.location.href = homeUrl; }
</script>
</body>
</html>
