<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ทำรายการสำเร็จ | ระบบ iPad</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .success-card {
            background: white;
            border-radius: 20px;
            padding: 40px 30px;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }
        .icon-circle {
            width: 80px;
            height: 80px;
            background-color: #ecfdf5;
            color: #10b981;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin: 0 auto 20px;
        }
        .info-box {
            background-color: #f8f9fa;
            border: 1px solid #e9ecef;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 25px;
            text-align: left;
        }
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 0.95rem;
        }
        .info-row:last-child {
            margin-bottom: 0;
        }
        .info-label {
            color: #6c757d;
        }
        .info-value {
            font-weight: 600;
            color: #212529;
            text-align: right;
            max-width: 60%;
        }
        .btn-primary-custom {
            background-color: #059669;
            border: none;
            color: white;
            font-weight: 600;
            font-size: 1.05rem;
            padding: 14px;
            border-radius: 12px;
            width: 100%;
            transition: 0.3s;
            box-shadow: 0 4px 10px rgba(16, 185, 129, 0.2);
        }
        .btn-primary-custom:hover {
            background-color: #047857;
            color: white;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div class="success-card">
        <div class="icon-circle">
            ✓
        </div>
        <h3 class="fw-bold text-dark mb-2" id="titleText">ดำเนินการเสร็จสิ้น</h3>
        <p class="text-muted mb-4" id="subText">บันทึกผลลงระบบเรียบร้อยแล้ว</p>

        <div class="info-box">
            <div class="info-row">
                <span class="info-label">เลขรายการ</span>
                <span class="info-value text-primary" id="reqIdText">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">สถานะ</span>
                <span class="info-value" id="statusText">-</span>
            </div>
            <div class="info-row">
                <span class="info-label">จำนวนเครื่อง</span>
                <span class="info-value" id="countText">-</span>
            </div>
        </div>

        <button class="btn btn-primary-custom" onclick="goHome()">กลับเมนูหลัก</button>
    </div>

    <script>
        window.onload = function() {
            const urlParams = new URLSearchParams(window.location.search);
            const reqId = urlParams.get('reqId') || '-';
            const status = urlParams.get('status') || 'อัปเดตสถานะสำเร็จ';
            const count = urlParams.get('count') || '-';
            
            document.getElementById('reqIdText').innerText = reqId;
            document.getElementById('statusText').innerText = status;
            document.getElementById('countText').innerText = count !== '-' ? count + " เครื่อง" : "-";
            
            if(status.includes('ตรวจ')) {
                document.getElementById('titleText').innerText = "ตรวจสอบเสร็จสิ้น";
            } else if (status.includes('เตรียม')) {
                document.getElementById('titleText').innerText = "เตรียมเครื่องเสร็จสิ้น";
            }
        };

        function goHome() {
            const role = localStorage.getItem("userRole");
            if (role === "Admin") {
                window.location.href = "admin.html";
            } else {
                window.location.href = "user.html";
            }
        }
    </script>
</body>
</html>
